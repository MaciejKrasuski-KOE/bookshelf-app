server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: review-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reviewdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

grpc:
  server:
    port: ${GRPC_PORT:9092}
  client:
    user-service:
      address: static://${USER_SERVICE_GRPC_HOST:localhost}:${USER_SERVICE_GRPC_PORT:9090}
      negotiation-type: plaintext
    shelf-service:
      address: static://${SHELF_SERVICE_GRPC_HOST:localhost}:${SHELF_SERVICE_GRPC_PORT:9091}
      negotiation-type: plaintext

logging:
  level:
    com.bookshelf: DEBUG
    net.devh.boot.grpc: INFO
